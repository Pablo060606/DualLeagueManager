{% extends 'base.html' %}
{% block title %}Crear Club – Dual-League Manager{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Crear tu Club</h2>
    <form method="POST" action="{{ url_for('clubs.create') }}">
        <div class="form-group">
            <label for="name">Nombre del club</label>
            <input type="text" id="name" name="name" required class="form-control"
                   placeholder="Ej: FC Barcelona">
        </div>
        <div class="form-group">
            <label for="budget">Presupuesto inicial ($)</label>
            <input type="number" id="budget" name="budget" value="10000000"
                   min="1000000" step="500000" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Crear Club</button>
    </form>
</div>
{% endblock %}
